name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  DB_HOST: localhost
  DB_PORT: 5432
  DB_NAME: cms
  DB_USER: cms
  DB_PASSWORD: cms_password
  REDIS_HOST: localhost
  REDIS_PORT: 6379
  AUTH_SECRET: ci-secret

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: cms
          POSTGRES_USER: cms
          POSTGRES_PASSWORD: cms_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cms"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Migrate database
        run: pnpm db:migrate

      - name: Seed database
        run: pnpm db:seed

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Check formatting
        run: pnpm format:check
